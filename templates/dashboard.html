<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANBOT PRO — Modular</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:#0A0E1A;color:#E5E7EB}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#111827;border-bottom:1px solid #1F2937;position:sticky;top:0;z-index:50}
.logo{font-size:24px;font-weight:900}.logo .dan{color:#00D4FF}.logo .bot{color:#7C3AED}
.wrap{padding:18px;display:grid;grid-template-columns:360px 1fr;gap:16px}
.card{background:#111827;border:1px solid #1F2937;border-radius:16px;padding:16px}
.card h3{font-size:13px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
label{font-size:11px;color:#9CA3AF}
input,select,textarea{width:100%;background:#0A0E1A;border:1px solid #374151;color:#E5E7EB;border-radius:10px;padding:10px 12px}
textarea{min-height:84px;resize:vertical}
button{border:none;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer}
.btn{background:#1F2937;color:#E5E7EB;border:1px solid #374151}
.btn-primary{background:linear-gradient(135deg,#00D4FF,#0098C7);color:#00131F}
.btn-success{background:linear-gradient(135deg,#10B981,#047857);color:#fff}
.btn-danger{background:linear-gradient(135deg,#EF4444,#B91C1C);color:#fff}
.row{display:flex;gap:8px;flex-wrap:wrap}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:#111827;border:1px solid #1F2937;border-radius:14px;padding:14px}
.stat .lbl{font-size:10px;color:#6B7280;text-transform:uppercase}
.stat .val{font-size:28px;font-weight:900;margin-top:6px}
.signal{background:#0A0E1A;border:1px solid #1F2937;border-radius:12px;padding:14px;min-height:88px}
.log{background:#0A0E1A;border:1px solid #1F2937;border-radius:12px;padding:10px;height:280px;overflow:auto;font-family:Consolas,monospace;font-size:11px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:8px;border-bottom:1px solid #1F2937;font-size:12px;text-align:left}
.table th{color:#9CA3AF;font-size:10px;text-transform:uppercase}
.pattern-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:280px;overflow:auto}
.check{display:flex;align-items:center;gap:8px;background:#0A0E1A;border:1px solid #1F2937;border-radius:10px;padding:8px}
.badge{display:inline-block;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:800}
.green{color:#10B981}.red{color:#EF4444}.cyan{color:#00D4FF}.muted{color:#6B7280}
.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
#danbot-mascot{position:fixed;bottom:24px;right:24px;width:110px;height:145px;cursor:grab;user-select:none;touch-action:none;z-index:9999;filter:drop-shadow(0 0 18px #00D4FF88)}
#danbot-mascot *{pointer-events:none}
#bot-scoreboard{margin-top:6px;background:rgba(10,14,26,.92);border:1px solid #1F2937;border-radius:12px;padding:6px 10px;display:flex;gap:10px;justify-content:center}
.bot-score-item{display:flex;flex-direction:column;align-items:center}.bot-score-label{font-size:9px;color:#6B7280}.bot-score-val{font-size:18px;font-weight:900}
@media(max-width:1100px){.wrap{grid-template-columns:1fr}.statgrid{grid-template-columns:1fr 1fr}.subgrid{grid-template-columns:1fr}.pattern-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><span class="dan">DAN</span><span class="bot">BOT PRO</span></div>
  <div class="row">
    <button class="btn" onclick="refreshAll()">Atualizar</button>
    <button class="btn-danger" onclick="logout()">Sair</button>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <h3>Configuração Modular</h3>
    <div class="grid">
      <div class="field"><label>Corretora</label><select id="cfg-broker"><option>IQ Option</option><option>Bullex</option><option>Exnova</option></select></div>
      <div class="field"><label>Conta</label><select id="cfg-account"><option value="PRACTICE">DEMO</option><option value="REAL">REAL</option></select></div>
      <div class="field full"><label>E-mail Corretora</label><input id="broker-email" type="email" placeholder="email@corretora.com"></div>
      <div class="field full"><label>Senha Corretora</label><input id="broker-pass" type="password" placeholder="********"></div>
      <div class="field"><label>Ativo</label><select id="cfg-asset"><option value="AUTO">AUTO</option></select></div>
      <div class="field"><label>Filtro Mercado</label><select id="cfg-market-filter"><option value="all">OTC + Aberto</option><option value="otc">Só OTC</option><option value="open">Só Aberto</option></select></div>
      <div class="field"><label>Modo Seleção Ativos</label><select id="cfg-bot-selector"><option value="auto_robot">AUTO BOT escolhe melhor</option><option value="auto_user">AUTO usuário escolhe até 6</option></select></div>
      <div class="field"><label>Modo Pool</label><select id="cfg-asset-mode"><option value="auto">Auto</option><option value="manual">Manual</option></select></div>
      <div class="field full"><label>Pool de Ativos (até 6, separados por vírgula)</label><textarea id="cfg-user-pool" placeholder="EURUSD, GBPUSD, EURUSD-OTC"></textarea></div>
      <div class="field"><label>Valor Entrada</label><input id="cfg-entry" type="number" step="0.01" value="2"></div>
      <div class="field"><label>Stop Loss</label><input id="cfg-sl" type="number" step="0.01" value="20"></div>
      <div class="field"><label>Stop Win</label><input id="cfg-sw" type="number" step="0.01" value="50"></div>
      <div class="field"><label>Confluência Mín.</label><input id="cfg-minconf" type="number" step="1" value="1"></div>
      <div class="field"><label>Confluência Máx. (0=off)</label><input id="cfg-maxconf" type="number" step="1" value="0"></div>
      <div class="field"><label>Timeframe análise</label><select id="cfg-timeframe"><option value="60">M1</option><option value="300">M5</option></select></div>
      <div class="field"><label>Expiração</label><select id="cfg-expiry"><option value="1">1 minuto</option><option value="5">5 minutos</option></select></div>
      <div class="field full"><label>Velas do Catalogador</label><input id="cfg-catalog" type="number" min="200" max="20000" step="100" value="20000"></div>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="btn-primary" onclick="saveConfig()">Salvar Config</button>
      <button class="btn" onclick="connectBroker()">Conectar Corretora</button>
      <button class="btn-success" onclick="startBot()">Iniciar Bot</button>
      <button class="btn-danger" onclick="stopBot()">Parar</button>
    </div>

    <h3 style="margin-top:16px">Módulos da Estratégia</h3>
    <div class="pattern-grid" id="strategy-grid">
      <label class="check"><input type="checkbox" data-strat="pat" checked> Padrões Candle</label>
      <label class="check"><input type="checkbox" data-strat="ema"> EMA</label>
      <label class="check"><input type="checkbox" data-strat="rsi"> RSI</label>
      <label class="check"><input type="checkbox" data-strat="macd"> MACD</label>
      <label class="check"><input type="checkbox" data-strat="bb"> Bollinger</label>
      <label class="check"><input type="checkbox" data-strat="stoch"> Stochastic</label>
      <label class="check"><input type="checkbox" data-strat="fib"> Fibonacci</label>
      <label class="check"><input type="checkbox" data-strat="lp"> Lógica do Preço</label>
    </div>

    <h3 style="margin-top:16px">Padrões de Candle</h3>
    <div class="row" style="margin-bottom:8px">
      <button class="btn" onclick="selectAllPatterns(true)">Marcar todos</button>
      <button class="btn" onclick="selectAllPatterns(false)">Desmarcar</button>
    </div>
    <div class="pattern-grid" id="pattern-grid"></div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="statgrid">
      <div class="stat"><div class="lbl">Wins</div><div class="val green" id="st-wins">0</div></div>
      <div class="stat"><div class="lbl">Losses</div><div class="val red" id="st-losses">0</div></div>
      <div class="stat"><div class="lbl">Win Rate</div><div class="val cyan" id="st-wr">0%</div></div>
      <div class="stat"><div class="lbl">Lucro</div><div class="val" id="st-profit">R$0,00</div></div>
    </div>

    <div class="subgrid">
      <div class="card">
        <h3>Sinal Atual</h3>
        <div class="signal" id="signal-box"><span class="muted">Sem sinal</span></div>
      </div>
      <div class="card">
        <h3>Log do Bot</h3>
        <div class="log" id="log-box"></div>
      </div>
    </div>

    <div class="card">
      <h3>Catalogador por Ativo</h3>
      <div class="row" style="margin-bottom:10px">
        <button class="btn-primary" onclick="runAssetCatalog()">Catalogar Ativo Selecionado</button>
        <button class="btn" onclick="runGlobalBacktest()">Catalogar Todos os Ativos</button>
      </div>
      <div id="catalog-meta" class="muted" style="margin-bottom:10px"></div>
      <div class="subgrid">
        <div>
          <table class="table" id="asset-patterns-table">
            <thead><tr><th>Padrão</th><th>WR</th><th>Ops</th><th>Dir</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div>
          <table class="table" id="asset-hours-table">
            <thead><tr><th>Hora</th><th>WR</th><th>Total</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Backtest Geral / Melhores Ativos</h3>
      <div id="global-meta" class="muted" style="margin-bottom:10px"></div>
      <table class="table" id="global-table">
        <thead><tr><th>Ativo</th><th>Mercado</th><th>WR</th><th>Ops</th><th>Melhor Padrão</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div id="danbot-mascot">
  <div id="robot-svg-wrap">
    <svg viewBox="0 0 110 110" width="110" height="110">
      <g class="robot-body-group">
        <rect x="22" y="20" rx="18" ry="18" width="66" height="58" fill="#111827" stroke="#00D4FF" stroke-width="2"></rect>
        <circle cx="42" cy="45" r="7" fill="#00D4FF"></circle>
        <circle cx="68" cy="45" r="7" fill="#00D4FF"></circle>
        <rect x="40" y="61" width="30" height="6" rx="3" fill="#7C3AED"></rect>
      </g>
    </svg>
  </div>
  <div id="bot-scoreboard">
    <div class="bot-score-item"><div class="bot-score-label">W</div><div class="bot-score-val green" id="bot-w">0</div></div>
    <div class="bot-score-item"><div class="bot-score-label">L</div><div class="bot-score-val red" id="bot-l">0</div></div>
  </div>
</div>

<script>
const AUTH = {headers:{'Content-Type':'application/json'}, credentials:'include'};
let STATUS_INTERVAL = null;

function money(v){ try{return 'R$'+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}catch(e){return 'R$0,00';}}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function nomeDisplay(n){ return n || '—'; }

async function api(url, opts={}){
  const res = await fetch(url, {...AUTH, ...opts});
  if(res.status===401){ location.href='/'; throw new Error('Não autorizado'); }
  return await res.json();
}

async function loadPatterns(){
  const d = await api('/api/candle-patterns');
  const grid = document.getElementById('pattern-grid');
  const sel = new Set(d.selected||[]);
  grid.innerHTML = (d.patterns||[]).map(p => `
    <label class="check"><input type="checkbox" class="pattern-check" value="${p.key}" ${sel.has(p.key)?'checked':''}> ${p.label}</label>
  `).join('');
}
function selectAllPatterns(flag){
  document.querySelectorAll('.pattern-check').forEach(el=> el.checked = !!flag);
}
function getSelectedPatterns(){ return Array.from(document.querySelectorAll('.pattern-check:checked')).map(el=>el.value); }
function getStrategies(){
  const out = {};
  document.querySelectorAll('[data-strat]').forEach(el => out[el.dataset.strat] = !!el.checked);
  return out;
}
async function loadCatalogConfig(){
  const d = await api('/api/catalog-config');
  document.getElementById('cfg-catalog').value = d.catalog_candles || 20000;
}
async function loadAssets(){
  try{
    const d = await api('/api/assets/available');
    const list = d.assets || [];
    const sel = document.getElementById('cfg-asset');
    const cur = sel.value;
    sel.innerHTML = '<option value="AUTO">AUTO</option>' + list.map(a=>`<option value="${a}">${a}</option>`).join('');
    if(cur) sel.value = cur;
  }catch(e){}
}
async function loadStatus(){
  const d = await api('/api/status');
  document.getElementById('st-wins').textContent = d.wins||0;
  document.getElementById('st-losses').textContent = d.losses||0;
  document.getElementById('st-wr').textContent = (d.win_rate||0)+'%';
  document.getElementById('st-profit').textContent = money(d.profit||0);
  document.getElementById('bot-w').textContent = d.wins||0;
  document.getElementById('bot-l').textContent = d.losses||0;
  document.getElementById('cfg-account').value = d.account_type || 'PRACTICE';
  document.getElementById('cfg-asset').value = d.selected_asset || 'AUTO';
  document.getElementById('cfg-minconf').value = d.min_confluence ?? 1;
  document.getElementById('cfg-maxconf').value = d.max_confluence ?? 0;
  document.getElementById('cfg-timeframe').value = String(d.analysis_timeframe || 60);
  document.getElementById('cfg-expiry').value = String(d.trade_expiry || 1);
  document.getElementById('cfg-catalog').value = d.catalog_candles || 20000;
  document.getElementById('cfg-bot-selector').value = d.bot_selector_mode || 'auto_robot';
  document.getElementById('cfg-asset-mode').value = d.asset_selector_mode || 'auto';
  document.getElementById('cfg-market-filter').value = d.asset_market_filter || 'all';
  document.getElementById('cfg-user-pool').value = (d.user_asset_pool||[]).join(', ');
  const strats = d.strategies || {};
  document.querySelectorAll('[data-strat]').forEach(el => { el.checked = !!strats[el.dataset.strat]; });
  const logs = (d.log||[]).slice().reverse();
  document.getElementById('log-box').innerHTML = logs.map(e=>`<div>[${escapeHtml(e.time)}] ${escapeHtml(e.msg||e.text||'')}</div>`).join('') || '<div class="muted">Sem logs</div>';
  const sig = d.signal;
  const sb = document.getElementById('signal-box');
  if(sig){
    sb.innerHTML = `<div><div style="font-weight:900;font-size:18px;color:${sig.d1==='CALL'?'#10B981':'#EF4444'}">${sig.d1||sig.direction||''}</div>
      <div style="margin-top:6px">${escapeHtml(sig.asset||'')}</div>
      <div class="muted" style="margin-top:6px">${escapeHtml(sig.pattern||sig.reason||'')}</div></div>`;
  }else{
    sb.innerHTML = '<span class="muted">Sem sinal</span>';
  }
}
async function saveConfig(){
  const payload = {
    selected_asset: document.getElementById('cfg-asset').value,
    account_type: document.getElementById('cfg-account').value,
    entry_value: parseFloat(document.getElementById('cfg-entry').value||'2'),
    stop_loss: parseFloat(document.getElementById('cfg-sl').value||'20'),
    stop_win: parseFloat(document.getElementById('cfg-sw').value||'50'),
    min_confluence: parseInt(document.getElementById('cfg-minconf').value||'1'),
    max_confluence: parseInt(document.getElementById('cfg-maxconf').value||'0'),
    analysis_timeframe: parseInt(document.getElementById('cfg-timeframe').value||'60'),
    trade_expiry: parseInt(document.getElementById('cfg-expiry').value||'1'),
    catalog_candles: parseInt(document.getElementById('cfg-catalog').value||'20000'),
    strategies: getStrategies(),
    selected_candle_patterns: getSelectedPatterns(),
    bot_selector_mode: document.getElementById('cfg-bot-selector').value,
    asset_selector_mode: document.getElementById('cfg-asset-mode').value,
    user_asset_pool: document.getElementById('cfg-user-pool').value.split(',').map(x=>x.trim()).filter(Boolean).slice(0,6),
    asset_market_filter: document.getElementById('cfg-market-filter').value
  };
  await api('/api/bot/config',{method:'POST', body: JSON.stringify(payload)});
  await api('/api/candle-patterns',{method:'POST', body: JSON.stringify({selected: payload.selected_candle_patterns})});
  await api('/api/catalog-config',{method:'POST', body: JSON.stringify({catalog_candles: payload.catalog_candles})});
  await loadStatus();
}
async function connectBroker(){
  const payload = {
    broker: document.getElementById('cfg-broker').value,
    email: document.getElementById('broker-email').value,
    password: document.getElementById('broker-pass').value,
    account_type: document.getElementById('cfg-account').value
  };
  const d = await api('/api/broker/connect',{method:'POST', body: JSON.stringify(payload)});
  if(d.ok){ pollBroker(); }
}
async function pollBroker(){
  for(let i=0;i<50;i++){
    const d = await api('/api/broker/connect/poll');
    if(d.status==='connected' || d.status==='error') break;
    await new Promise(r=>setTimeout(r,2000));
  }
  await loadAssets(); await loadStatus();
}
async function startBot(){
  const payload = {
    broker: document.getElementById('cfg-broker').value,
    selected_asset: document.getElementById('cfg-asset').value,
    account_type: document.getElementById('cfg-account').value,
    entry_value: parseFloat(document.getElementById('cfg-entry').value||'2'),
    stop_loss: parseFloat(document.getElementById('cfg-sl').value||'20'),
    stop_win: parseFloat(document.getElementById('cfg-sw').value||'50'),
    min_confluence: parseInt(document.getElementById('cfg-minconf').value||'1'),
    max_confluence: parseInt(document.getElementById('cfg-maxconf').value||'0'),
    analysis_timeframe: parseInt(document.getElementById('cfg-timeframe').value||'60'),
    trade_expiry: parseInt(document.getElementById('cfg-expiry').value||'1'),
    catalog_candles: parseInt(document.getElementById('cfg-catalog').value||'20000'),
    strategies: getStrategies(),
    selected_candle_patterns: getSelectedPatterns(),
    bot_selector_mode: document.getElementById('cfg-bot-selector').value,
    asset_selector_mode: document.getElementById('cfg-asset-mode').value,
    user_asset_pool: document.getElementById('cfg-user-pool').value.split(',').map(x=>x.trim()).filter(Boolean).slice(0,6),
    asset_market_filter: document.getElementById('cfg-market-filter').value
  };
  await api('/api/bot/start',{method:'POST', body: JSON.stringify(payload)});
  await loadStatus();
}
async function stopBot(){ await api('/api/bot/stop',{method:'POST'}); await loadStatus(); }
async function runAssetCatalog(){
  const asset = document.getElementById('cfg-asset').value === 'AUTO' ? 'EURUSD-OTC' : document.getElementById('cfg-asset').value;
  const candles = parseInt(document.getElementById('cfg-catalog').value||'20000');
  const d = await api('/api/backtest_real',{method:'POST', body: JSON.stringify({asset, candles})});
  const r = d.result;
  document.getElementById('catalog-meta').textContent = `${r.asset} · ${r.candles} velas · ${r.total_sinais} sinais · WR ${r.overall_win_rate}% · Tendência ${r.current_trend}`;
  document.querySelector('#asset-patterns-table tbody').innerHTML = (r.top_patterns||[]).map(p=>`<tr><td>${nomeDisplay(p.desc)}</td><td>${p.win_rate}%</td><td>${p.total}</td><td>${p.direction||''}</td></tr>`).join('') || '<tr><td colspan="4">Sem padrões</td></tr>';
  document.querySelector('#asset-hours-table tbody').innerHTML = (r.top_hours||[]).map(h=>`<tr><td>${h.hour}:00</td><td>${h.win_rate}%</td><td>${h.total}</td></tr>`).join('') || '<tr><td colspan="3">Sem horários</td></tr>';
}
async function runGlobalBacktest(){
  const d = await api('/api/backtest');
  document.getElementById('global-meta').textContent = `${d.assets_tested} ativos · ${d.total_ops} ops · WR geral ${d.overall_wr}% · Melhor ativo: ${d.result?.best_asset || d.best_asset || ''}`;
  document.querySelector('#global-table tbody').innerHTML = (d.ranked||[]).map(a=>`<tr><td>${a.asset}</td><td>${a.type||''}</td><td>${a.win_rate}%</td><td>${a.ops}</td><td>${nomeDisplay(a.best_pattern)} ${a.best_pattern_wr?`(${a.best_pattern_wr}% · ${a.best_pattern_ops})`:''}</td></tr>`).join('') || '<tr><td colspan="5">Sem resultados</td></tr>';
}
function refreshAll(){ loadAssets(); loadPatterns(); loadCatalogConfig(); loadStatus(); }
async function logout(){ await api('/api/logout',{method:'POST'}); location.href='/'; }

function initMascotDrag(){
  const el = document.getElementById('danbot-mascot');
  let dragging = false, startX = 0, startY = 0, origR = 20, origB = 24;
  try{
    const pos = JSON.parse(localStorage.getItem('danbot_mascot_pos')||'null');
    if(pos){ el.style.right = pos.right+'px'; el.style.bottom = pos.bottom+'px'; }
  }catch(e){}
  function save(){ localStorage.setItem('danbot_mascot_pos', JSON.stringify({right: parseInt(el.style.right)||20, bottom: parseInt(el.style.bottom)||24}));}
  el.addEventListener('pointerdown', ev => {
    dragging = true; startX = ev.clientX; startY = ev.clientY;
    const s = getComputedStyle(el); origR = parseInt(s.right)||20; origB = parseInt(s.bottom)||24;
    el.setPointerCapture(ev.pointerId);
  });
  el.addEventListener('pointermove', ev => {
    if(!dragging) return;
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    el.style.right = Math.max(10, origR - dx) + 'px';
    el.style.bottom = Math.max(10, origB - dy) + 'px';
  });
  el.addEventListener('pointerup', ()=>{ dragging=false; save(); });
}
window.addEventListener('DOMContentLoaded', async ()=>{
  initMascotDrag();
  await refreshAll();
  STATUS_INTERVAL = setInterval(loadStatus, 4000);
});
</script>
</body>
</html>
