<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANBOT — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0E1A;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.07) 0,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(124,58,237,.07) 0,transparent 60%)}
.card{background:#111827;border:1px solid #1F2937;border-radius:20px;padding:44px 38px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,.6)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:52px;font-weight:900;letter-spacing:-1px}
.logo h1 span.dan{color:#00D4FF;text-shadow:0 0 30px rgba(0,212,255,.5)}
.logo h1 span.bot{color:#7C3AED;text-shadow:0 0 30px rgba(124,58,237,.5)}
.logo p{color:#9CA3AF;font-size:14px;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.broker-select{margin-bottom:20px}
.broker-select label{display:block;color:#9CA3AF;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.broker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.broker-btn{background:#1F2937;border:2px solid #374151;border-radius:10px;padding:10px 6px;color:#9CA3AF;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.broker-btn:hover,.broker-btn.active{border-color:#00D4FF;color:#00D4FF;background:rgba(0,212,255,.08)}
.field{margin-bottom:16px}
.field label{display:block;color:#9CA3AF;font-size:12px;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
.field input{width:100%;background:#1F2937;border:1px solid #374151;border-radius:10px;padding:13px 16px;color:#F9FAFB;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#00D4FF;box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.field input::placeholder{color:#6B7280}
.license-field{display:none}
.btn-login{width:100%;background:linear-gradient(135deg,#00D4FF,#0099BB);border:none;border-radius:12px;padding:15px;color:#0A0E1A;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;letter-spacing:1px;transition:all .2s;text-transform:uppercase}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(0,212,255,.35)}
.btn-login:active{transform:translateY(0)}
.btn-master{width:100%;background:linear-gradient(135deg,#7C3AED,#5B21B6);border:none;border-radius:12px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;letter-spacing:1px;transition:all .2s;text-transform:uppercase}
.btn-master:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(124,58,237,.35)}
.msg{text-align:center;padding:10px;border-radius:8px;font-size:13px;margin-top:14px;display:none}
.msg.error{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.2);display:block}
.msg.warn{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.2);display:block}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.divider span{color:#4B5563;font-size:12px;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1F2937}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;background:#1F2937;border:2px solid transparent;border-radius:10px;color:#9CA3AF;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{border-color:#00D4FF;color:#00D4FF;background:rgba(0,212,255,.08)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1><span class="dan">DAN</span><span class="bot">BOT</span></h1>
    <p>Trading Bot OTC</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('user')">👤 Usuário</div>
    <div class="tab" onclick="setTab('master')">👑 Master</div>
  </div>

  <!-- Corretora (só usuário) -->
  <div id="broker-section" class="broker-select">
    <label>Selecione a Corretora</label>
    <div class="broker-grid">
      <div class="broker-btn active" onclick="selectBroker(this,'IQ Option')">IQ Option</div>
      <div class="broker-btn" onclick="selectBroker(this,'Bullex')">Bullex</div>
      <div class="broker-btn" onclick="selectBroker(this,'Exnova')">Exnova</div>
      <div class="broker-btn" onclick="selectBroker(this,'Avallon')">Avallon</div>

    </div>
  </div>

  <div class="field">
    <label id="label-user">E-mail / Usuário</label>
    <input type="text" id="inp-user" placeholder="seu@email.com">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <div class="field license-field" id="license-field">
    <label>Chave de Licença DANBOT</label>
    <input type="text" id="inp-lic" placeholder="DANBOT-XXXX-XXXX-XXXX">
  </div>

  <button class="btn-login" onclick="doLogin()">🚀 ENTRAR</button>

  <div id="msg" class="msg"></div>
</div>

<input type="hidden" id="broker-val" value="IQ Option">
<input type="hidden" id="tab-val" value="user">

<script>
function setTab(tab){
  document.getElementById('tab-val').value = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&tab==='user')||(i===1&&tab==='master'));
  });
  document.getElementById('broker-section').style.display = tab==='user'?'block':'none';
  document.getElementById('license-field').style.display  = tab==='user'?'block':'none';
  document.getElementById('label-user').textContent = tab==='master'?'Usuário Master':'E-mail / Usuário';
  document.getElementById('inp-user').placeholder   = tab==='master'?'admin':'seu@email.com';
}

function selectBroker(el, name){
  document.querySelectorAll('.broker-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('broker-val').value = name;
}

function showMsg(text, type='error'){
  const m = document.getElementById('msg');
  m.className = 'msg ' + type;
  m.textContent = text;
}

async function doLogin(){
  const tab    = document.getElementById('tab-val').value;
  const user   = document.getElementById('inp-user').value.trim();
  const pass   = document.getElementById('inp-pass').value;
  const lic    = document.getElementById('inp-lic').value.trim();
  const broker = document.getElementById('broker-val').value;
  if(!user||!pass){showMsg('Preencha usuário e senha');return;}
  if(tab==='user'&&!lic){showMsg('Informe sua chave de licença DANBOT');return;}
  showMsg('Verificando...','warn');
  try{
    const r = await fetch('/api/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass, license_key:lic,
                            broker:broker, device_id: navigator.userAgent.slice(0,80)})
    });
    // Tratar resposta não-JSON (erro 500/502 do servidor)
    const ct = r.headers.get('content-type')||'';
    if(!ct.includes('application/json')){
      const txt = await r.text();
      showMsg('Servidor temporariamente indisponível. Aguarde e tente novamente.');
      console.error('Resposta não-JSON:', r.status, txt.slice(0,200));
      return;
    }
    const d = await r.json();
    if(d.ok){
      localStorage.setItem('danbot_broker', broker);
      if(d.token) localStorage.setItem('token', d.token);
      window.location.href = d.role==='master' ? '/master' : '/dashboard';
    } else {
      showMsg(d.error||'Credenciais inválidas');
    }
  } catch(e){
    showMsg('Sem conexão com o servidor. Verifique sua internet.');
    console.error('Login erro:', e);
  }
}
</script>
</body>
</html>
